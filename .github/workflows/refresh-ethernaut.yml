name: refresh-ethernaut-progress

on:
  schedule:
    # Daily at 07:37 UTC. Offset from the contributions refresh (06:26 UTC)
    # so both jobs don't pile up. Europe/Madrid: 08:37 CET / 09:37 CEST.
    - cron: "37 7 * * *"
  workflow_dispatch:

# Default-deny. The job-scoped App installation token (below) is what
# actually has write access; nothing should fall back to GITHUB_TOKEN.
permissions: {}

concurrency:
  group: refresh-ethernaut
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL || 'https://sepolia.gateway.tenderly.co' }}

    steps:
      - name: Mint App installation token
        id: app-token
        uses: actions/create-github-app-token@df432ceedc7162793a195dd1713ff69aefc7379e # v2.0.6
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}
          repositories: 0xAdriaTorralba.github.io

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python3 -m pip install --upgrade ruamel.yaml

      - name: Regenerate Ethernaut section of ctf_progress.yml
        run: |
          python3 scripts/refresh_ethernaut.py \
            --player 0x295F3Fe50eFB4b05C966C7399DC3d7d1438353Ad \
            --output _data/ctf_progress.yml

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- _data/ctf_progress.yml; then
            echo "ctf_progress.yml unchanged — nothing to commit."
            exit 0
          fi
          git config user.name  "personal-website-bot[bot]"
          git config user.email "personal-website-bot[bot]@users.noreply.github.com"
          git add _data/ctf_progress.yml
          git commit -m "chore(data): refresh ethernaut progress"
          git push origin HEAD:main
