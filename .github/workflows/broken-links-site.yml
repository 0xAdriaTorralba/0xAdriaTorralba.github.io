name: Check for broken links on site

# Demoted from workflow_run on Deploy to a weekly scheduled backstop.
# html-proofer now runs in-line on every PR inside deploy.yml's build-strict
# job, which catches internal link breakage before merge. Lychee's external
# check remains useful as a weekly sanity sweep.

on:
  schedule:
    - cron: "30 6 * * 1" # Mondays 06:30 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-links-on-site:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.5"
          bundler-cache: true
      - name: Update _config.yml ⚙️
        uses: fjogeleit/yaml-update-action@main
        with:
          commitChange: false
          valueFile: "_config.yml"
          changes: |
            {
              "giscus.repo": "${{ github.repository }}",
              "baseurl": ""
            }
      - name: Install and Build 🔧
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          pip3 install --upgrade jupyter
          export JEKYLL_ENV=production
          bundle exec jekyll build
      - name: Purge unused CSS 🧹
        run: |
          npm install -g purgecss
          purgecss -c purgecss.config.js
      - name: Link Checker 🔗
        uses: lycheeverse/lychee-action@v1.9.0
        with:
          fail: true
          # only check local links
          args: --offline --remap '_site(/?.*)/assets/(.*) _site/assets/$2' --verbose --no-progress '_site/**/*.html'
