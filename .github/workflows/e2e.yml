name: E2E (Playwright)

on:
  push:
    branches: [master, main]
    paths:
      - "_pages/**"
      - "_includes/**"
      - "_layouts/**"
      - "_sass/**"
      - "assets/js/**"
      - "tests/e2e/**"
      - "playwright.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/e2e.yml"
  pull_request:
    branches: [master, main]
    paths:
      - "_pages/**"
      - "_includes/**"
      - "_layouts/**"
      - "_sass/**"
      - "assets/js/**"
      - "tests/e2e/**"
      - "playwright.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/e2e.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright (chromium + webkit + firefox)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.5"
          bundler-cache: true

      - name: Install Jekyll build deps
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          pip3 install --upgrade nbconvert

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm deps (no postinstall scripts)
        # Playwright downloads browsers via postinstall; we skip all scripts
        # here and re-invoke `playwright install` explicitly below so the only
        # network side-effect is Playwright's own verified browser download.
        run: npm ci --ignore-scripts

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers + OS deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium webkit firefox

      - name: Install Playwright OS deps (cache hit path)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium webkit firefox

      - name: Build site
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build --destination _site

      - name: Run Playwright tests
        env:
          SITE_DIR: _site
          CI: "1"
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
