# Open-source PRs authored by the site owner.
#
# Rendered on /security/#tools under "Open-Source Contributions",
# grouped by `category`.
#
# Refresh with:
#   gh search prs --author=<handle> --limit=200 --sort=created \
#     --json repository,title,url,number,createdAt,closedAt,state
# Then re-run the category script in _data/contributions.regen.md
# (inline mapping, see security.md template rendering for order).
#
# Fields:
#   repo        — <owner>/<name>
#   pr          — PR number
#   title       — PR title (verbatim)
#   url         — PR URL
#   state       — merged | open | closed   (closed = closed without merging)
#   date        — merged date if merged, closed date if closed-unmerged, created date if open
#   category    — blockchain | tooling | personal | academic
#   description — optional one-line context (not auto-filled)
#   scope       — optional tag (zk, defi, tooling, ...)

