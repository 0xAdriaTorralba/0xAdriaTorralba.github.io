# Academic service. Rendered on /research/#academic-service AND /cv/.
# Add a new entry per role; sort newest-first when rendered.
#
# Fields:
#   type    — conference | journal | workshop | other  (drives the badge label)
#   venue   — full conference / journal name
#   abbr    — short form ("ACM CCS", "SECRYPT", "IEEE S&P")
#   year    — integer (use a single year per entry; multi-year roles get one entry per year)
#   role    — "Reviewer", "Poster Jury", "Posters and Demos Committee", etc.
#   url     — link to the role's official page (call for posters / committee page)
#   notes   — optional extra context

