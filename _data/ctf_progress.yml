# CTF / wargame progress tracker.
#
# Consumed by _includes/ctf_progress.liquid on /security/.
# Update after each solve: flip `status` to "solved" and fill `solved_on`.
# Optional `writeup` field links to an internal blog post.
#
# status values: solved | in-progress | not-started
#
# Ethernaut progress is derived from on-chain LevelCompletedLog events emitted
# by the Ethernaut contract on Sepolia (0xa3e7317E591D5A0F1c605be1b3aC4D2ae56104d6)
# filtered by the player wallet (0x295F3Fe50eFB4b05C966C7399DC3d7d1438353Ad) in
# topic1. Refreshed daily by .github/workflows/refresh-ethernaut.yml via
# scripts/refresh_ethernaut.py — manual edits to `status` / `solved_on` get
# overwritten on the next run. Writeups stay hand-edited.
#
# Ethernaut level names and difficulty (0–8) are pulled from the official
# OpenZeppelin gamedata. To refresh when OZ adds levels, run:
#   curl -s https://raw.githubusercontent.com/OpenZeppelin/ethernaut/master/client/src/gamedata/gamedata.json \
#     | python3 -c "import sys,json; d=json.load(sys.stdin); [print(f\"{l['deployId']:>2} {l['difficulty']:>2} {l['name']}\") for l in d['levels']]"
#
# DVD does not publish an official difficulty; `difficulty` stays null.

# Team CTF events — competitive capture-the-flag events attended with a team.
# Distinct from the solo wargames below (Ethernaut, DVD) because the signal
# here is team ranking + event prestige.
team_events:
  - name: "Wonderland CTF 2026"
    location: "Cannes, France"
    date: 2026
    team_name: "Stack Too Deep"
    final_rank: 9
    total_teams: 34
    peak_rank: 3
    team:
      - Adrià Torralba-Agell
      - Pol Ureña Heras
      - Gianfranco Bazzani
      - Ezequiel Pérez
      - Rubén Cruz Acevedo
    notes: "Wonderland's on-site CTF during EthCC 9 in Cannes. Smart-contract security challenges (Solidity + EVM). The 9/34 badge is the final rank; peak 3 was our best standing during the event."
    url: null
    leaderboard_url: "https://ctf.wonderland.xyz/leaderboard"
    linkedin_url: "https://www.linkedin.com/posts/adriatorralba-agell_last-week-i-was-at-ethcc-9-in-cannes-heres-activity-7447652372786626562-22uB"
    x_url: "https://x.com/0xAdriaTorralba/status/2041897272053485794"

